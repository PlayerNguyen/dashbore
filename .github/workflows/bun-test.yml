# .github/workflows/bun-test.yml
name: Bun Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run Bun Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dashbore
          POSTGRES_PASSWORD: dashbore
          POSTGRES_DB: dashbore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dashbore:dashbore@127.0.0.1:5432/dashbore_test
      JWT_SECRET: supersecret
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h 127.0.0.1 -U dashbore; do
            echo "Waiting for PostgreSQL..."
            sleep 3
          done

      - name: Execute Prisma Migrate
        run: bun run migrate

      - name: Seed the database
        run: bun run seed

      - name: Run tests
        run: bun run test
